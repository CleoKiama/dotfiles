# Appearance
# Window effects and layer rules

# Window effect
blur=0
blur_layer=0
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 0
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor= 0x000000ff

border_radius=20
borderpx=1
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=0.9

# Horizontal inner gap: spacing between windows side-by-side
gappih=6
# Vertical inner gap: spacing between windows stacked vertically
gappiv=6
# Horizontal outer gap: spacing between windows and the left/right screen edges
gappoh=6
# Vertical outer gap: spacing between windows and the top/bottom screen edges
gappov=6

# Width of the scratchpad window (80% of screen width)
scratchpad_width_ratio=0.8
# Height of the scratchpad window (90% of screen height)
scratchpad_height_ratio=0.9

# Color of the desktop background (visible through gaps)
rootcolor=0x201b14ff
# Border color for windows that are not focused
bordercolor=0x444444ff
# Border color for the currently active/focused window
focuscolor=0x7fc8ffff
# Border color when a window is in maximized screen mode
maximizescreencolor=0x89aa61ff
# Border color for windows requesting urgent attention
urgentcolor=0x9b0000ff
# Border color for windows currently in the scratchpad
scratchpadcolor=0x516c93ff
# Border color for "Global" windows pinned to all tags
globalcolor=0xb153a7ff
# Border color for "Overlay" windows that stay always on top
overlaycolor=0x14a57cff


# layer rule
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi


# window rules
windowrule=tags:1,appid:zen
windowrule=tags:2,appid:com.mitchellh.ghostty
windowrule=tags:2,appid:com.mitchellh.ghostty
windowrule=tags:4,appid:org.gnome.Nautilus


