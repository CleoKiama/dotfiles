# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=SUPER,R,reload_config


# menu and terminal
bind=SUPER,a,spawn,$HOME/.config/rofi/rofilaunch.sh  
bind=SUPER,T,spawn,ghostty
bind=SUPER,V,spawn,$HOME/dotfiles/scripts/cliphist.sh -c
bind=SUPER,B,spawn,zen-browser-bin
bind=SUPER,E,spawn, nautilus
bind=SUPER,period,spawn, $HOME/dotfiles/scripts/emoji_picker.sh
bind=SUPER,C,spawn, rofi -show calc -modi calc -no-show-match -no-sort

# screen capture 
bind=SUPER+SHIFT,C,spawn_shell, $HOME/.config/mango/scripts/ocr-shot.sh
bind=SUPER+SHIFT,T,spawn_shell, $HOME/.config/mango/scripts/area-screenshot.sh


# --- Volume (using wpctl) ---
bind=none,XF86AudioRaiseVolume,spawn_shell,wpctl set-volume --limit 1.0 @DEFAULT_AUDIO_SINK@ 0.02+
bind=none,XF86AudioLowerVolume,spawn_shell,wpctl set-volume --limit 1.0 @DEFAULT_AUDIO_SINK@ 0.02-
bind=none,XF86AudioMute,spawn_shell,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=none,XF86AudioMicMute,spawn_shell,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# --- Brightness (using brightnessctl) ---
bind=none,XF86MonBrightnessUp,spawn,brightnessctl --class=backlight set +2%
bind=none,XF86MonBrightnessDown,spawn,brightnessctl --class=backlight set 2%-

# --- Media Controls (using playerctl) ---
bind=none,XF86AudioNext,spawn_shell,playerctl next
bind=none,XF86AudioPause,spawn_shell,playerctl play-pause
bind=none,XF86AudioPlay,spawn_shell,playerctl play-pause
bind=none,XF86AudioPrev,spawn_shell,playerctl previous


# exit
bind=SUPER+SHIFT,M,quit
bind=SUPER,Q,killclient,

# switch window focus
bind=SUPER,Tab,focusstack,next
bind=SUPER,H,focusdir,left
bind=SUPER,L,focusdir,right
bind=SUPER,J,focusstack,next
bind=SUPER,K,focusstack,prev

# swap window
bind=SUPER+SHIFT,K,exchange_client,up
bind=SUPER+SHIFT,J,exchange_client,down
bind=SUPER+ALT,H,exchange_client,left
bind=SUPER+ALT,L,exchange_client,right

# switch window status
bind=SUPER,g,toggleglobal
bind=SUPER,O,toggleoverview
bind=ALT,Return,togglefloating
bind=ALT,a,togglemaximizescreen
bind=SUPER,f,togglefullscreen,
bind=SUPER+SHIFT,f,togglemaximizescreen
bind=ALT+SHIFT,F,togglefakefullscreen
#bind=SUPER,i,minimized,
bind=SUPER,o,toggleoverlay
#bind=SUPER+SHIFT,I,restore_minimized
bind=ALT,Z,toggle_scratchpad

# scroller layout
bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset

# switch layout
#bind=SUPER,n,switch_layout

# tag switch
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# toggle view tag
bind=ctrl,1,toggleview,1
bind=ctrl,2,toggleview,2
bind=ctrl,3,toggleview,3
bind=ctrl,4,toggleview,4
bind=ctrl,5,toggleview,5
bind=ctrl,6,toggleview,6
bind=ctrl,7,toggleview,7
bind=ctrl,8,toggleview,8
bind=ctrl,9,toggleview,9

# MOVE CLIENT TO TAG
# tag: move client to the tag and focus it
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0
#move tag silent
bind=SUPER+Alt,1,tagsilent,1
bind=SUPER+Alt,2,tagsilent,2
bind=SUPER+Alt,3,tagsilent,3
bind=SUPER+Alt,4,tagsilent,4
bind=SUPER+Alt,5,tagsilent,5
bind=SUPER+Alt,6,tagsilent,6
bind=SUPER+Alt,7,tagsilent,7
bind=SUPER+Alt,8,tagsilent,8
bind=SUPER+Alt,9,tagsilent,9


# monitor switch
bind=SUPER+Alt,Left,tagmon,left
bind=SUPER+Alt,Right,tagmon,right


# resizewin
bind=SUPER,minus,resizewin,-50,0     # shrink width
bind=SUPER+SHIFT,equal,resizewin,50,0 # grow width

# Mouse Button Bindings
# NONE mode key only work in ov mode
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=NONE,btn_left,toggleoverview,1
mousebind=NONE,btn_right,killclient,0

# Axis Bindings. scroll to the next tag with an active client
axisbind=SUPER,UP,viewtoleft_have_client
axisbind=SUPER,DOWN,viewtoright_have_client


# swithc monitor focus
bind=SUPER,comma,focusmon,left


# mouse Gesturebind
gesturebind=none,left,3,focusdir,left
gesturebind=none,right,3,focusdir,right
gesturebind=none,up,3,focusdir,up
gesturebind=none,down,3,focusdir,down
gesturebind=none,left,4,viewtoleft_have_client
gesturebind=none,right,4,viewtoright_have_client
gesturebind=none,up,4,toggleoverview
gesturebind=none,down,4,toggleoverview
