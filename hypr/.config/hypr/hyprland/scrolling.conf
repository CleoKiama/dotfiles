exec-once = hyprpm reload # load plugins at startup

plugin {
    hyprscrolling {
        column_width = 0.7
        explicit_column_widths = 0.333, 0.5, 0.667, 1.0
        fullscreen_on_one_column = true

        focus_fit_method = 1 # when a column is focused, what method to use to bring it into view. 0 - center, 1 - fit
        follow_focus = true
    }
}
