# █░█░█ █ █▄░█ █▀▄ █▀█ █░█░█   █▀█ █░█ █░░ █▀▀ █▀
# ▀▄▀▄▀ █ █░▀█ █▄▀ █▄█ ▀▄▀▄▀   █▀▄ █▄█ █▄▄ ██▄ ▄█

# Floating
windowrule {
  name = "Floating window apps"
  match:class = ^(blueberry\.py|org\.pulseaudio\.pavucontrol|com\.network\.manager)$

  float = true
}


# Picture-in-Picture
windowrule = tag +picture-in-picture, match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
windowrule = float true, match:tag picture-in-picture
windowrule = keep_aspect_ratio false, match:tag picture-in-picture
windowrule = move 90% 90%, match:tag picture-in-picture
windowrule = size 10% 10%, match:tag picture-in-picture
windowrule = pin true, match:tag picture-in-picture


# Dialog windows – float+center these windows.
windowrulev2 = center, title:^(Open File)(.*) 
windowrulev2 = center, title:^(Select a File)(.*) 
windowrulev2 = center, title:^(Open Folder)(.*) 
windowrulev2 = center, title:^(Save As)(.*) 
windowrulev2 = center, title:^(Library)(.*) 
windowrulev2 = center, title:^(File Upload)(.*) 
windowrulev2 = float, title:^(Open File)(.*) 
windowrulev2 = float, title:^(Select a File)(.*) 
windowrulev2 = float, title:^(Open Folder)(.*) 
windowrulev2 = float, title:^(Save As)(.*) 
windowrulev2 = float, title:^(Library)(.*) 
windowrulev2 = float, title:^(File Upload)(.*) 
windowrulev2 = float, title:^()(.*) 
# Add size rules
windowrulev2 = size 60% 70%, title:^(Open File)(.*) 
windowrulev2 = size 60% 70%, title:^(Select a File)(.*) 
windowrulev2 = size 60% 70%, title:^(Open Folder)(.*) 
windowrulev2 = size 60% 70%, title:^(Save As)(.*) 
windowrulev2 = size 60% 70%, title:^(Library)(.*) 
windowrulev2 = size 60% 70%, title:^(File Upload)(.*) 
windowrulev2 = size 80% 60%, title:^(Bluetooth)(.*) 

# idle_inhibit rules
windowrule = idle_inhibit  true,  match:fullscreen match:class ^(.*mpv.*)$|^(.*vlc.*)$


# █░░ ▄▀█ █▄█ █▀▀ █▀█   █▀█ █░█ █░░ █▀▀ █▀
# █▄▄ █▀█ ░█░ ██▄ █▀▄   █▀▄ █▄█ █▄▄ ██▄ ▄█

layerrule = blur 1,match:namespace rofi
layerrule = ignore_alpha 0,match:namespace rofi
layerrule = blur 1,match:namespace notifications
layerrule = ignore_alpha 0,match:namespace notifications
layerrule = blur 1,match:namespace swaync-notification-window
layerrule = ignore_alpha 0,match:namespace swaync-notification-window
layerrule = blur true,match:namespace swaync-control-center
layerrule = ignore_alpha 0,match:namespace swaync-control-center
layerrule = blur 1, xray 1, match:namespace logout_dialog


### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules


# app Workspace assignments

windowrule = workspace 1, match:class google-chrome
windowrule = workspace 1, match:class zen
windowrule = workspace 1, match:class Chromium
windowrule = workspace 2, match:class Code
windowrule = workspace 3, match:class md.obsidian.Obsidian
windowrule = workspace 3, match:class com.github.th_ch.youtube_music
windowrule = workspace 3, match:class mpv
windowrule = workspace 3, match:class vlc
windowrule = workspace 4, match:class org.gnome.Nautilus
windowrule = match:class com.mitchellh.ghostty, workspace 2, no_blur true


