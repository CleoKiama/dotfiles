#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal

exec-once = waybar  >/dev/null 2>&1 
exec-once = swaync  >/dev/null 2>&1 
exec-once = awww-daemon >/dev/null 2>&1 
exec-once = sunsetr > /dev/null 2>&1  # night light

exec-once = sunsetr > /dev/null 2>&1  # night light

exec-once = wl-paste --watch cliphist store # Clipboard history
exec-once = sleep 15 & cliphist wipe


exec-once = $HOME/.local/bin/wallpaper_randomizer $HOME/Pictures/wallpapers 1800

# Authentication -vscode
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 || /usr/libexec/polkit-gnome-authentication-agent-1

# for hyprland screen sharing 
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

